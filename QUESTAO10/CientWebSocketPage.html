<!--
  QUESTÃO 10 — Página web do chat WebSocket
  Conecta ao servidor ws://hostname:8765 e exibe/envia mensagens em tempo real.
  Participantes: Gabriel Castro, Murilo Escobedo, Pávila Miranda, Humberto Freire
-->

<!DOCTYPE html>
<html>
<body>
  <!-- Indicador de status da conexão WebSocket -->
  <p id="status">Conectando...</p>

  <!-- Área onde mensagens recebidas de outros usuários são exibidas -->
  <div id="messages"></div>
  
  <!-- Campo de entrada de texto para digitar mensagens -->
  <input id="input" type="text">
  
  <!-- Botão que chama a função send() ao ser clicado -->
  <button onclick="send()">Enviar</button>
  
  <script>
    // Porta do WebSocket — deve coincidir com WS_PORT no ServerWebSocket.py
    const wsPort = 8765;

    // Usa o mesmo host da página (funciona em 2 PCs: http://IP_SERVIDOR:8080/)
    const wsUrl = `ws://${window.location.hostname}:${wsPort}`;
    const ws = new WebSocket(wsUrl);

    const statusEl = document.getElementById('status');

    ws.onopen = () => {
      statusEl.textContent = `Conectado a ${wsUrl}`;
    };

    ws.onerror = () => {
      statusEl.textContent = `Erro ao conectar em ${wsUrl}. Verifique se o servidor está rodando e o firewall permite a porta ${wsPort}.`;
    };

    ws.onclose = () => {
      statusEl.textContent = 'Desconectado do servidor.';
    };
    
    // Evento disparado quando uma mensagem chega do servidor WebSocket
    ws.onmessage = (event) => {
      // Adiciona parágrafo com o texto recebido na div #messages
      document.getElementById('messages').innerHTML += '<p>' + event.data + '</p>';
    };
    
    /**
     * Envia o conteúdo do input via WebSocket e limpa o campo.
     * Chamada pelo botão "Enviar".
     */
    function send() {
      const input = document.getElementById('input');
      ws.send(input.value);  // Envia string ao servidor (broadcast aos outros)
      input.value = '';        // Limpa o campo após envio
    }
  </script>
</body>
</html>
